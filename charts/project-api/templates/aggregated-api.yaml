{{- $fullName := include "project-api.fullname" . -}}
{{- $namespace := .Release.Namespace -}}
{{- $ca := genCA "project-api-ca" 3650 -}}
{{- $cert := genSignedCert (printf "%s.%s.svc" $fullName $namespace) nil (list $fullName (printf "%s.%s" $fullName $namespace) (printf "%s.%s.svc" $fullName $namespace) (printf "%s.%s.svc.cluster.local" $fullName $namespace)) 3650 $ca -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $fullName }}-certs
  labels:
    {{- include "project-api.labels" . | nindent 4 }}
type: kubernetes.io/tls
data:
  tls.crt: {{ $cert.Cert | b64enc }}
  tls.key: {{ $cert.Key | b64enc }}
  ca.crt: {{ $ca.Cert | b64enc }}
---
apiVersion: apiregistration.k8s.io/v1
kind: APIService
metadata:
  name: {{ .Values.apiService.name }}
  labels:
    {{- include "project-api.labels" . | nindent 4 }}
spec:
  service:
    name: {{ $fullName }}
    namespace: {{ $namespace }}
  group: {{ .Values.apiService.group }}
  version: {{ .Values.apiService.version }}
  insecureSkipTLSVerify: false
  groupPriorityMinimum: {{ .Values.apiService.groupPriorityMinimum }}
  versionPriority: {{ .Values.apiService.versionPriority }}
  caBundle: {{ $ca.Cert | b64enc }}
